version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: image-search-backend
    ports:
      - "1008:1008"
    environment:
      # MongoDB credentials
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-image_search_db}
      
      # Pinecone credentials
      - PINECONE_API_KEY=${PINECONE_API_KEY:-pcsk_3FjqCu_4UJP6DFRBoeCrEwRoUtViK6kBV7BuecSpitfBwjhtsNcxBKEFqfRhS4unoA4yBy}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME:-image-embeddings}
      
      # Google Drive
      - GOOGLE_DRIVE_LINK=${GOOGLE_DRIVE_LINK:-}
    volumes:
      - ./backend/downloaded_images:/app/downloaded_images
      - ./backend/cookies.txt:/root/.cache/gdown/cookies.txt
    depends_on:
      - mongodb
    restart: unless-stopped

  caddy:
    image: caddy:latest
    container_name: caddy-proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DUCKDNS_SUBDOMAIN=${DUCKDNS_SUBDOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    restart: unless-stopped

  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns-updater
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - SUBDOMAINS=${DUCKDNS_SUBDOMAIN}
      - TOKEN=${DUCKDNS_TOKEN}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: image-search-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: image-search-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data:
  caddy_data:
  caddy_config:
